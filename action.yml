name: "GuardLine Security Scan"
description: "Automated security scanning for pull requests"
author: "Tyler Outlaw-Bradley"

inputs:
  scan-level:
    description: "Scan depth: quick, standard, or deep"
    required: false
    default: "standard"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install GuardLine
      shell: bash
      run: |
        pip install pyyaml requests
        git clone https://github.com/toutlawbradley/GuardLine.git /tmp/guardline

    - name: Run GuardLine
      shell: bash
      run: |
        export SCAN_TARGET="${GITHUB_WORKSPACE}"
        cd /tmp/guardline
        python -m src.main
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}

    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@v3
      with: 
        sarif_file: /tmp/guardline/results.sarif
        token: ${{ github.token }}

branding:
  icon: "shield"
  color: "red"